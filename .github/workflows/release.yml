name: Automated Release & Auto-Update Pipeline

on:
  push:
    tags:
      - 'v*' # Trigger on version tags e.g., v1.0.0, v2.1.0-beta

jobs:
  release:
    name: Build & Publish Releases
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Install Frontend Dependencies
        run: npm install --prefix frontend

      - name: Install Electron Dependencies
        run: npm install --prefix electron

      - name: Build Frontend Production Bundle
        run: npm run build --prefix frontend

      - name: Stage Frontend Build & Icons
        run: npm run copy-dist --prefix electron

      - name: Build & Publish Electron Packages
        uses: samuelmeuli/action-electron-builder@v1
        with:
          package_root: electron
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
          mac_certs: false # Bypass code signing for automated dev builds if certs not provided
